<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Album Redirect</title>

<script>

// ==========================================
// NFC Album Tracker
//
// This page:
// 1. Attempts to obtain GPS location
// 2. Sends visit data to Cloudflare Worker
// 3. Redirects to Spotify album
//
// Update these values when needed.
// ==========================================

const WORKER_URL =
  "https://nfc-keychain-tracker.meyarirangkeychain.workers.dev/";

const SPOTIFY_ALBUM_URL =
  "https://open.spotify.com/album/3ukkRHDHbN8tNRPKsGZR1h?si=50596d20d12446e4";

// ==========================================
// Send visit data to Cloudflare
// ==========================================

async function logVisit(data) {

  try {

    await fetch(
      WORKER_URL,
      {
        method: "POST",
        headers: {
          "Content-Type":
            "application/json"
        },
        body: JSON.stringify(data)
      }
    );

  } catch (error) {

    console.log(
      "Tracking failed:",
      error
    );

  }

}

// ==========================================
// Redirect user to Spotify
// ==========================================

function redirectToSpotify() {

  window.location.replace(
    SPOTIFY_ALBUM_URL
  );

}

// ==========================================
// GPS Success
// ==========================================

function gpsSuccess(position) {

  logVisit({

    page: "album",

    latitude:
      position.coords.latitude,

    longitude:
      position.coords.longitude,

    accuracy:
      position.coords.accuracy

  });

  setTimeout(
    redirectToSpotify,
    500
  );

}

// ==========================================
// GPS Denied or Failed
// ==========================================

function gpsError() {

  logVisit({

    page: "album"

  });

  setTimeout(
    redirectToSpotify,
    500
  );

}

// ==========================================
// Start
// ==========================================

navigator.geolocation.getCurrentPosition(
  gpsSuccess,
  gpsError,
  {
    enableHighAccuracy: true,
    timeout: 5000,
    maximumAge: 0
  }
);

</script>

</head>
<body>

  
</body>
</html>
